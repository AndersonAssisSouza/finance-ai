<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#6366f1">
<title>Finance AI — Controle financeiro inteligente</title>
<meta name="description" content="Sistema completo de gestão financeira pessoal com IA, conciliação bancária Pluggy, orçamentos, metas, investimentos e simulador FIRE.">
<link rel="manifest" href="./manifest.json">
<link rel="icon" type="image/svg+xml" href="./icon.svg">
<link rel="apple-touch-icon" href="./icon.svg">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Finance AI">
<link rel="stylesheet" href="./styles.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<!-- AUTH -->
<section id="auth">
  <div class="auth-card">
    <div class="auth-hero">
      <div class="logo"><div class="icon">💎</div><div>Finance AI</div></div>
      <p>Seu dinheiro, inteligente. Contas, cartões, orçamentos, metas e IA em um só lugar.</p>
    </div>
    <div class="auth-body">
      <div class="auth-tabs">
        <button id="au-tab-login" class="active" type="button">Entrar</button>
        <button id="au-tab-reg" type="button">Criar conta</button>
      </div>
      <form id="auth-form">
        <label class="field hidden" id="au-name-wrap">
          <span class="lbl">Nome</span>
          <input id="au-name" class="input" placeholder="Seu nome">
        </label>
        <label class="field">
          <span class="lbl">Email</span>
          <input id="au-email" type="email" class="input" required placeholder="voce@email.com">
        </label>
        <label class="field">
          <span class="lbl">Senha</span>
          <input id="au-pass" type="password" class="input" required minlength="4" placeholder="••••••••">
        </label>
        <button id="au-submit" type="submit" class="btn btn-gradient w-full" style="padding:10px">Entrar</button>
        <div id="auth-err" class="badge danger hidden mt-3" style="padding:10px; display:block"></div>
      </form>
      <div class="text-xs text-muted mt-4" style="text-align:center">
        💾 Modo local — seus dados ficam neste navegador.<br>
        <a href="#" onclick="document.querySelector('#au-email').value='demo@finance.ai';document.querySelector('#au-pass').value='demo1234';return false" class="pointer" style="color:var(--brand)">preencher com conta demo</a>
      </div>
    </div>
  </div>
</section>

<!-- APP -->
<div id="app">
  <aside class="sidebar"></aside>
  <main class="main"></main>
  <div id="mobile-bar" class="mobile-bar">
    <button id="menu-btn" class="btn btn-ghost btn-icon" aria-label="Menu">☰</button>
    <div class="flex items-center gap-2">
      <button id="search-btn" class="btn btn-ghost btn-icon" aria-label="Buscar" title="Buscar (Ctrl+K)">🔎</button>
      <button id="notif-btn" class="btn btn-ghost btn-icon" aria-label="Notificações" style="position:relative">
        🔔
        <span id="notif-dot" class="notif-dot hidden"></span>
      </button>
      <button id="install-btn" class="btn btn-ghost btn-icon hidden" aria-label="Instalar">⬇️</button>
    </div>
  </div>
</div>

<!-- Search modal -->
<div id="search-modal" class="hidden"></div>

<script src="./storage.js"></script>
<script src="./ai_engine.js"></script>
<script src="./app.js"></script>
<script>
// PWA registration
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js').catch(()=>{});
  });
}
// Install prompt
let deferredPrompt = null;
window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  deferredPrompt = e;
  document.getElementById('install-btn')?.classList.remove('hidden');
});
document.getElementById('install-btn')?.addEventListener('click', async () => {
  if (!deferredPrompt) return;
  deferredPrompt.prompt();
  await deferredPrompt.userChoice;
  deferredPrompt = null;
  document.getElementById('install-btn').classList.add('hidden');
});
</script>
</body>
</html>
